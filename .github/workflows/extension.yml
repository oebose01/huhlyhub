name: Build and Publish Extension

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/extension/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/extension.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/extension/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run extension tests
        run: |
          cd frontend
          npx vitest extension/__tests__/ --run

      - name: Package extension
        run: |
          cd frontend/extension
          mkdir -p dist
          cp manifest.json popup.html popup.js crypto-helper.js verify.js dist/
          cd dist
          zip -r ../huhlyhub-extension.zip *

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: frontend/extension/huhlyhub-extension.zip
